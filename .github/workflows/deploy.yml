name: Deploy Hexo

on:
  push:
    branches:
      - master # 监听博客主库的变动（请确认为 master 或 main）

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取博客引擎库
        uses: actions/checkout@v4

      - name: 2. 抓取外部内容库
        uses: actions/checkout@v4
        with:
          repository: sepwolves/FanYuanFuSong
          ref: main  # 如果小说库是 main，请保持此处为 main
          token: ${{ secrets.REPO_B_TOKEN }} 
          path: source/_posts/fan-yuan-fu-song 

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 4. 安装依赖
        run: npm install

      - name: 5. 执行 Hexo 静态生成
        run: npx hexo generate

      - name: 6. 上传产物并发布
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
