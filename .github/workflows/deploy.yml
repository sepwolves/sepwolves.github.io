name: Deploy Hexo

    on:
    push:
    branches:
      - master # 监听博客主库的变动

    jobs:
    build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取博客引擎库 (sepwolves.github.io)
        uses: actions/checkout@v4

      - name: 2. 抓取外部内容库 (FanYuanFuSong)
        uses: actions/checkout@v4
        with:
          repository: sepwolves/FanYuanFuSong
          # 关键：即使是同账号，私有库仍需在博客库配置 REPO_B_TOKEN
          token: ${{ secrets.REPO_B_TOKEN }} 
          # 映射到 Hexo 的文章存放路径
          path: source/_posts/fan-yuan-fu-song 

      - name: 3. Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 4. 安装依赖
        run: npm install

      - name: 5. 执行 Hexo 静态生成
        # 此时“反元复宋”已被注入到 posts 目录下，会一并参与编译。
        run: npx hexo generate

      - name: 6. 上传产物并发布
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

    deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
